name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - legacy
    tags:
      - 'v*.*.*'
  pull_request:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: legacy
          submodules: true

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        run: |
          BUILD_TOOLS_VERSION="36.0.0"
          NDK_VERSION="28.2.13676358"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/${BUILD_TOOLS_VERSION}" >> $GITHUB_PATH
          echo "$ANDROID_HOME/ndk/${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      - name: Set up fd
        run: |
          sudo apt-get update
          sudo apt-get install -y fd-find
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Set up Android Manifest Merger
        uses: OussamaTeyib/setup-manifest-merger@v1

      - name: Set up bundletool
        uses: amyu/setup-bundletool@v1.1

      - name: Set up AAPT2
        uses: OussamaTeyib/setup-aapt2@v1

      - name: Build project
        env:
          STORE_FILE: ../../dev.p12
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "${{ secrets.STORE_FILE }}" | base64 --decode > dev.p12
          cmake -B Build/Debug \
                -G "Ninja"
          cmake --build Build/Debug
          cmake --build Build/Debug --target create_aab
          cmake --build Build/Debug --target create_apks_universal
          cmake -B Build/Release \
                -G "Ninja" \
                -DCMAKE_BUILD_TYPE=MinSizeRel
          cmake --build Build/Release
          cmake --build Build/Release --target create_aab
          cmake --build Build/Release --target create_apks_universal

      - name: Lint project
        run: |
          cmake --build Build/Debug --target lint
          cmake --build Build/Release --target lint

      - name: Upload debug APKs
        uses: actions/upload-artifact@v7
        with:
          name: debug-apks
          path: Build/Debug/outputs/*.apk

      - name: Upload release APKs
        uses: actions/upload-artifact@v7
        with:
          name: release-apks
          path: Build/Release/outputs/*.apk

      - name: Upload debug AABs
        uses: actions/upload-artifact@v7
        with:
          name: debug-aabs
          path: Build/Debug/outputs/*.aab

      - name: Upload release AABs
        uses: actions/upload-artifact@v7
        with:
          name: release-aabs
          path: Build/Release/outputs/*.aab

      - name: Upload debug APK sets
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-sets
          path: Build/Debug/outputs/*.apks

      - name: Upload release APK sets
        uses: actions/upload-artifact@v7
        with:
          name: release-apk-sets
          path: Build/Release/outputs/*.apks

      - name: Upload native debug symbols
        uses: actions/upload-artifact@v7
        with:
          name: native-debug-symbols
          path: Build/Release/outputs/native-debug-symbols.zip

      - name: Upload debug lint reports
        uses: actions/upload-artifact@v7
        with:
          name: debug-reports
          path: Build/Debug/reports/*

      - name: Upload release lint reports
        uses: actions/upload-artifact@v7
        with:
          name: release-reports
          path: Build/Release/reports/*

      - name: Generate build provenance attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            Build/Debug/outputs/*.apk
            Build/Release/outputs/*.apk
            Build/Debug/outputs/*.aab
            Build/Release/outputs/*.aab
            Build/Debug/outputs/*.apks
            Build/Release/outputs/*.apks
            Build/Release/outputs/native-debug-symbols.zip
            Build/Debug/reports/*
            Build/Release/reports/*
