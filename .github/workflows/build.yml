name: Build 1.0.x

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: 'v1.0.x'
          submodules: true

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-37.0 build-tools;36.0.0'
      - name: Add SDK to PATH
        run: echo "$ANDROID_HOME/build-tools/36.0.0" >> $GITHUB_PATH

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          link-to-sdk: true
          local-cache: true
      - name: Add NDK to PATH
        run: echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.25.0'

      - name: Set up fd
        run: |
          sudo apt-get update
          sudo apt-get install -y fd-find
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Set up Android Manifest Merger
        run: |
          VERSION="31.9.0"
          mkdir -p $HOME/ManifestMerger
          curl -fsSL -o $HOME/ManifestMerger/manifest-merger.jar https://github.com/distriqt/android-manifest-merger/releases/download/v${VERSION}/manifest-merger-${VERSION}.jar
          printf '#!/bin/bash\njava -jar $HOME/ManifestMerger/manifest-merger.jar "$@"\n' > $HOME/ManifestMerger/manifest-merger
          chmod +x $HOME/ManifestMerger/manifest-merger
          echo "$HOME/ManifestMerger" >> $GITHUB_PATH

      - name: Set up bundletool
        run: |
          VERSION="1.18.3"
          mkdir -p $HOME/bundletool
          curl -fsSL -o $HOME/bundletool/bundletool.jar https://github.com/google/bundletool/releases/download/${VERSION}/bundletool-all-${VERSION}.jar
          printf '#!/bin/bash\njava -jar $HOME/bundletool/bundletool.jar "$@"\n' > $HOME/bundletool/bundletool
          chmod +x $HOME/bundletool/bundletool
          echo "$HOME/bundletool" >> $GITHUB_PATH

      - name: Set up AAPT2
        run: |
          VERSION="9.2.0-alpha07-15009934"
          mkdir -p $HOME/AAPT2
          curl -fsSL -o $HOME/AAPT2/aapt2.jar https://dl.google.com/dl/android/maven2/com/android/tools/build/aapt2/${VERSION}/aapt2-${VERSION}-linux.jar
          unzip -o $HOME/AAPT2/aapt2.jar -d $HOME/AAPT2
          chmod +x $HOME/AAPT2/aapt2
          echo "$HOME/AAPT2" >> $GITHUB_PATH

      - name: Build project
        run: |
          cmake -B Build/Debug \
                -G "Ninja"
          cmake --build Build/Debug
          cmake --build Build/Debug --target create_aab
          cmake --build Build/Debug --target create_apks_universal
          cmake -B Build/Release \
                -G "Ninja" \
                -DCMAKE_BUILD_TYPE=MinSizeRel
          cmake --build Build/Release
          cmake --build Build/Release --target create_aab
          cmake --build Build/Release --target create_apks_universal

      - name: Lint project
        run: |
          cmake --build Build/Debug --target lint
          cmake --build Build/Release --target lint

      - name: Upload debug APKs
        uses: actions/upload-artifact@v7
        with:
          name: debug-apks
          path: Build/Debug/outputs/*.apk

      - name: Upload release APKs
        uses: actions/upload-artifact@v7
        with:
          name: release-apks
          path: Build/Release/outputs/*.apk

      - name: Upload debug AABs
        uses: actions/upload-artifact@v7
        with:
          name: debug-aabs
          path: Build/Debug/outputs/*.aab

      - name: Upload release AABs
        uses: actions/upload-artifact@v7
        with:
          name: release-aabs
          path: Build/Release/outputs/*.aab

      - name: Upload debug APK sets
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-sets
          path: Build/Debug/outputs/*.apks

      - name: Upload release APK sets
        uses: actions/upload-artifact@v7
        with:
          name: release-apk-sets
          path: Build/Release/outputs/*.apks

      - name: Upload native debug symbols
        uses: actions/upload-artifact@v7
        with:
          name: native-debug-symbols
          path: Build/Release/outputs/native-debug-symbols.zip

      - name: Upload debug lint reports
        uses: actions/upload-artifact@v7
        with:
          name: debug-reports
          path: Build/Debug/reports/*

      - name: Upload release lint reports
        uses: actions/upload-artifact@v7
        with:
          name: release-reports
          path: Build/Release/reports/*

      - name: Generate build provenance attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            Build/Debug/outputs/*.apk
            Build/Release/outputs/*.apk
            Build/Debug/outputs/*.aab
            Build/Release/outputs/*.aab
            Build/Debug/outputs/*.apks
            Build/Release/outputs/*.apks
            Build/Release/outputs/native-debug-symbols.zip
            Build/Debug/reports/*
            Build/Release/reports/*
