name: Release 1.0.x

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  discussions: write

jobs:
  release:
    # Disable the workflow so that only the main branch can create releases
    if: false

    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: 'v1.0.x'
          submodules: true

      - name: Set up Android SDK
        run: |
          BUILD_TOOLS_VERSION="36.0.0"
          NDK_VERSION="28.2.13676358"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/${BUILD_TOOLS_VERSION}" >> $GITHUB_PATH
          echo "$ANDROID_HOME/ndk/${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      - name: Set up fd
        run: |
          sudo apt-get update
          sudo apt-get install -y fd-find
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Set up Android Manifest Merger
        run: |
          VERSION="31.9.0"
          mkdir -p $HOME/ManifestMerger
          curl -fsSL -o $HOME/ManifestMerger/manifest-merger.jar https://github.com/distriqt/android-manifest-merger/releases/download/v${VERSION}/manifest-merger-${VERSION}.jar
          printf '#!/bin/bash\njava -jar $HOME/ManifestMerger/manifest-merger.jar "$@"\n' > $HOME/ManifestMerger/manifest-merger
          chmod +x $HOME/ManifestMerger/manifest-merger
          echo "$HOME/ManifestMerger" >> $GITHUB_PATH

      - name: Set up bundletool
        run: |
          VERSION="1.18.3"
          mkdir -p $HOME/bundletool
          curl -fsSL -o $HOME/bundletool/bundletool.jar https://github.com/google/bundletool/releases/download/${VERSION}/bundletool-all-${VERSION}.jar
          printf '#!/bin/bash\njava -jar $HOME/bundletool/bundletool.jar "$@"\n' > $HOME/bundletool/bundletool
          chmod +x $HOME/bundletool/bundletool
          echo "$HOME/bundletool" >> $GITHUB_PATH

      - name: Set up AAPT2
        run: |
          VERSION="9.2.0-15009934"
          mkdir -p $HOME/AAPT2
          curl -fsSL -o $HOME/AAPT2/aapt2.jar https://dl.google.com/dl/android/maven2/com/android/tools/build/aapt2/${VERSION}/aapt2-${VERSION}-linux.jar
          unzip -o $HOME/AAPT2/aapt2.jar -d $HOME/AAPT2
          chmod +x $HOME/AAPT2/aapt2
          echo "$HOME/AAPT2" >> $GITHUB_PATH

      - name: Build project
        env:
          STORE_FILE: ../../dev.p12
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "${{ secrets.STORE_FILE }}" | base64 --decode > dev.p12
          cmake -B Build/Release \
                -G "Ninja" \
                -DCMAKE_BUILD_TYPE=MinSizeRel
          cmake --build Build/Release
          cmake --build Build/Release --target create_aab
          cmake --build Build/Release --target create_apks_universal

      - name: Prepare release assets
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="v1.0.0"

          # Move APKs
          for apk in Build/Release/outputs/HelloWorld_${RELEASE_VERSION}_*.apk; do
            mv "$apk" ./
          done

          # Move AAB
          mv Build/Release/outputs/HelloWorld_${RELEASE_VERSION}.aab ./

          # Move APK set
          mv Build/Release/outputs/HelloWorld_${RELEASE_VERSION}_universal.apks ./

          # Move native debug symbols
          mv Build/Release/outputs/native-debug-symbols.zip ./

          # Generate SHA256SUMS
          sha256sum \
            HelloWorld_${RELEASE_VERSION}_*.apk \
            HelloWorld_${RELEASE_VERSION}.aab \
            HelloWorld_${RELEASE_VERSION}_universal.apks \
            native-debug-symbols.zip \
            > SHA256SUMS

          # Sign SHA256SUMS
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --armor --detach-sign SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v1.0.0
          fail_on_unmatched_files: true
          generate_release_notes: true
          discussion_category_name: Announcements
          files: |
            HelloWorld_v1.0.0_*.apk
            HelloWorld_v1.0.0.aab
            HelloWorld_v1.0.0_universal.apks
            native-debug-symbols.zip
            SHA256SUMS
            SHA256SUMS.asc
